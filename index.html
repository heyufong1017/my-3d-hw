<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 3D 模型展示 - Hw2</title>
    <style>
        /* 基礎頁面樣式 */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #333;
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 讓 3D 模型容器保持比例 (16:9) */
        .sketchfab-embed-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 比例 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

        .sketchfab-embed-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <header>
        <h1>3D 作品展示網站</h1>
    </header>

    <div class="container">
        <h2>作品名稱：Hw2何俞鋒</h2>
        <p>你可以使用滑鼠縮放或旋轉來檢視下方的 3D 模型。</p>

        <div class="sketchfab-embed-wrapper">
            <iframe title="Hw2何俞鋒" 
                    frameborder="0" 
                    allowfullscreen 
                    mozallowfullscreen="true" 
                    webkitallowfullscreen="true" 
                    allow="autoplay; fullscreen; xr-spatial-tracking" 
                    xr-spatial-tracking 
                    execution-while-out-of-viewport 
                    execution-while-not-rendered 
                    web-share 
                    src="https://sketchfab.com/models/399dd5f9523e44febfdc5e678565883d/embed">
            </iframe>
        </div>
    </div>

    <footer>
        &copy; 2026 何俞鋒 - 專案展示
    </footer>

</body>
</html>
